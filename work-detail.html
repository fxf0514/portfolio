    /* ========== 画册翻页浏览器 ========== */
    .flipbook-viewer {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }
    .flipbook-viewer__header {
      text-align: center;
      margin-bottom: 36px;
    }
    .flipbook-viewer__title {
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      font-weight: 300;
      color: #FFFFFF;
      margin-bottom: 8px;
      letter-spacing: 0.02em;
    }
    .flipbook-viewer__meta {
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.5);
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    /* 主展示区 */
    .flipbook-stage {
      position: relative;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .flipbook-stage__img {
      max-width: 92%;
      max-height: 92%;
      object-fit: contain;
      border-radius: 4px;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .flipbook-stage__img.entering {
      opacity: 0;
      transform: scale(0.97);
    }
    .flipbook-stage__img.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* 翻页方向提示 */
    .flipbook-stage__hint-left,
    .flipbook-stage__hint-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 18%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.2);
      font-size: 2rem;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 2;
      user-select: none;
    }
    .flipbook-stage__hint-left { left: 0; justify-content: flex-start; padding-left: 16px; }
    .flipbook-stage__hint-right { right: 0; justify-content: flex-end; padding-right: 16px; }
    .flipbook-stage__hint-left:hover,
    .flipbook-stage__hint-right:hover {
      color: rgba(255,255,255,0.7);
      background: linear-gradient(90deg, rgba(255,255,255,0.04), transparent);
    }
    .flipbook-stage__hint-right:hover {
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04));
    }

    /* 控制栏 */
    .flipbook-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      margin-top: 24px;
    }
    .flipbook-controls__btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-size: 1.125rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .flipbook-controls__btn:hover:not(:disabled) {
      border-color: rgba(255,255,255,0.5);
      color: #FFFFFF;
      background: rgba(255,255,255,0.06);
    }
    .flipbook-controls__btn:disabled {
      opacity: 0.2;
      cursor: default;
    }
    .flipbook-controls__page {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.6);
      font-weight: 300;
      letter-spacing: 0.05em;
      min-width: 60px;
      text-align: center;
    }
    .flipbook-controls__page strong {
      color: #FFFFFF;
      font-weight: 400;
    }

    /* 页码圆点指示器 */
    .flipbook-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .flipbook-dots__dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: none;
      cursor: pointer;
      transition: all 0.25s;
      padding: 0;
    }
    .flipbook-dots__dot:hover {
      background: rgba(255,255,255,0.35);
    }
    .flipbook-dots__dot.active {
      background: #FFFFFF;
      transform: scale(1.2);
    }

    /* 缩略图横滚条 */
    .flipbook-thumbs {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.15) transparent;
    }
    .flipbook-thumbs__item {
      flex-shrink: 0;
      width: 72px;
      height: 54px;
      border-radius: 4px;
      overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer;
      opacity: 0.5;
      transition: all 0.2s;
    }
    .flipbook-thumbs__item:hover { opacity: 0.8; }
    .flipbook-thumbs__item.active {
      border-color: #FFFFFF;
      opacity: 1;
    }
    .flipbook-thumbs__item img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* 键盘提示 */
    .flipbook-keyboard-hint {
      text-align: center;
      margin-top: 16px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      font-weight: 300;
    }

    /* 作品概述区（画册也显示） */
    .work-detail__overview {
      max-width: 720px;
      margin: 0 auto 60px;
      padding-bottom: 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .work-detail__overview h1 {
      font-size: clamp(1.5rem, 3vw, 2.75rem);
      font-weight: 500;
      line-height: 1.25;
      letter-spacing: 0.01em;
      margin-bottom: 16px;
      color: #FFFFFF;
    }

      font-weight: 300;

      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);

      font-weight: 300;
      font-size: 0.9375rem;
    }
    .tool-icons {
      display: flex;

    }

      border-radius: 4px;
      font-size: 0.8125rem;
      color: rgba(255,255,255,0.6);
      font-weight: 300;
    }

    /* 普通作品章节样式（复用现有） */
    .work-section {
      margin-bottom: 20px;
    }
    .work-section__title {

      font-weight: 300;
      color: #FFFFFF;
      margin-bottom: 20px;
      letter-spacing: 0.01em;
    }

      font-weight: 300;
      line-height: 2;
    }
    .work-section__body p { margin: 20px; }
    .pull-quote {

      color: rgba(255,255,255,0.7);
      padding: 20px 24px;
      border-radius: 0 8px 8px 0;
      margin: 24px 0;
      font-size: 0.9375rem;
      line-height: 1.8;
    }
    .image-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 28px;
    }
    .image-grid img {
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 28px;
    }
    .emoji-grid img {
      border-radius: 6px;
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      cursor: pointer;
      transition: transform 0.2s;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .emoji-grid img:hover {

      border-color: rgba(255,255,255,0.15);
    }
    .preview-grid {

      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 28px;

    .preview-grid img {

      transition: transform 0.2s;

    }

      text-decoration: none;
      transition: all 0.25s;

      background: rgba(255,255,255,0.03);
    }
    .work-nav__item--next { text-align: right; margin-left: auto; }

      color: rgba(255,255,255,0.4);
      margin-bottom: 6px;
      letter-spacing: 0.05em;

    .work-nav__title {

      color: rgba(255,255,255,0.8);
      font-weight: 300;

      .flipbook-stage { aspect-ratio: 3 / 2.2; }
      .flipbook-stage__hint-left,
      .flipbook-stage__hint-right { display: none; }
      .image-grid { grid-template-columns: 1fr; }
      .work-nav { flex-direction: column; }
      .work-nav__item { max-width: 100%; }
    }
    .img-with-model {
      position: relative;
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
    }
    .img-with-model img {
      width: 100%;
      display: block;
    }
    .img-with-model .model-btn {

      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      padding: 7px 18px;
      background: rgba(0,0,0,0.65);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 18px;
      font-size: 0.8125rem;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      z-index: 2;
    }
    .img-with-model .model-btn:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.5);
    }
    #modelViewerModal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(12px);
    }
    #modelViewerModal .model-close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(255,255,255,0.1);

      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #modelViewerModal .model-close-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    #modelViewerModal .model-hint {
      text-align: center;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      padding: 10px;
      letter-spacing: 0.05em;
    }

      width: 100%;
      height: 100%;
      background: transparent;

          <div class="work-detail__overview">
            <div>
              <h1 style="font-size:clamp(1.5rem,3vw,2.75rem);font-weight:300;line-height:1.25;letter-spacing:0.01em;margin-bottom:16px;color:#FFFFFF;">${work.title}</h1>
              <p class="subtitle">${work.subtitle}</p>
            </div>
            <div class="work-detail__meta">
              ${work.meta.map(m => `
                <div class="meta-item">
                  <h4>${m.label}</h4>
                  <p>${Array.isArray(m.value) ? m.value.map(t => `<span class="tool-icon">${t}</span>`).join('') : m.value}</p>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- 翻页主区域 -->
          <div class="flipbook-stage" id="flip-stage">
            <div class="flipbook-stage__hint-left" onclick="flipTo(flipCurrent - 1)">‹</div>
            <img class="flipbook-stage__img visible" id="flip-img" src="${pages[0]}" alt="第1页" />
            <div class="flipbook-stage__hint-right" onclick="flipTo(flipCurrent + 1)">›</div>
          </div>

          <!-- 控制栏 -->
          <div class="flipbook-controls">
            <button class="flipbook-controls__btn" id="flip-prev" onclick="flipTo(flipCurrent - 1)" disabled>‹</button>
            <div class="flipbook-controls__page"><strong id="flip-cur">1</strong> / ${pages.length}</div>
            <button class="flipbook-controls__btn" id="flip-next" onclick="flipTo(flipCurrent + 1)">›</button>
          </div>

          <!-- 圆点指示器 -->
          <div class="flipbook-dots" id="flip-dots">
            ${pages.map((_, i) => `
              <button class="flipbook-dots__dot${i === 0 ? ' active' : ''}" onclick="flipTo(${i})" aria-label="第${i+1}页"></button>
            `).join('')}
          </div>

          <!-- 缩略图条 -->
          <div class="flipbook-thumbs" id="flip-thumbs">
            ${pages.map((src, i) => `
              <div class="flipbook-thumbs__item${i === 0 ? ' active' : ''}" onclick="flipTo(${i})">
                <img src="${src}" alt="第${i+1}页" loading="lazy">
              </div>
            `).join('')}
          </div>

          <div class="flipbook-keyboard-hint">← → 键翻页 · 点击左右区域快速翻页</div>
        </div>

        <!-- 上一篇/下一篇 -->
        <div class="work-nav">
          ${prevWork ? `
            <a href="work-detail.html?id=${prevId}" class="work-nav__item">
              <div class="work-nav__label">← 上一篇</div>
              <div class="work-nav__title">${prevWork.title}</div>
            </a>
          ` : '<div></div>'}
          ${nextWork ? `
            <a href="work-detail.html?id=${nextId}" class="work-nav__item work-nav__item--next">
              <div class="work-nav__label">下一篇 →</div>
              <div class="work-nav__title">${nextWork.title}</div>
            </a>
          ` : '<div></div>'}
        </div>
      `;

      document.getElementById('work-content').innerHTML = html;

      // 初始化翻页状态
      window.flipPages = pages;
      window.flipCurrent = 0;
      window.flipImg = document.getElementById('flip-img');

      // 键盘导航
      document.addEventListener('keydown', handleFlipKey);
      // 触摸滑动
      initFlipTouch();
    }

    // 翻页函数
    function flipTo(idx) {
      if (idx < 0 || idx >= window.flipPages.length) return;
      const img = window.flipImg;
      if (!img) return;

      img.classList.remove('visible');
      img.classList.add('entering');

      setTimeout(() => {
        img.src = window.flipPages[idx];
        window.flipCurrent = idx;
        img.classList.remove('entering');
        img.classList.add('visible');
        updateFlipUI();
      }, 180);
    }

    function updateFlipUI() {
      const cur = window.flipCurrent;
      const total = window.flipPages.length;
      const curEl = document.getElementById('flip-cur');
      const prevBtn = document.getElementById('flip-prev');
      const nextBtn = document.getElementById('flip-next');
      if (curEl) curEl.textContent = cur + 1;
      if (prevBtn) prevBtn.disabled = cur === 0;
      if (nextBtn) nextBtn.disabled = cur === total - 1;

      // 更新圆点
      document.querySelectorAll('.flipbook-dots__dot').forEach((d, i) => {
        d.classList.toggle('active', i === cur);
      });
      // 更新缩略图
      document.querySelectorAll('.flipbook-thumbs__item').forEach((t, i) => {
        t.classList.toggle('active', i === cur);
      });
    }

    function handleFlipKey(e) {
      if (e.key === 'ArrowLeft') { e.preventDefault(); flipTo(window.flipCurrent - 1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); flipTo(window.flipCurrent + 1); }
    }

    function initFlipTouch() {
      const stage = document.getElementById('flip-stage');
      if (!stage) return;
      let startX = 0;
      stage.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
      stage.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if (Math.abs(dx) > 50) {
          if (dx < 0) flipTo(window.flipCurrent + 1);
          else flipTo(window.flipCurrent - 1);
        }
      }, { passive: true });
    }

    // ============================================================
    //  渲染：普通作品（章节式）
    // ============================================================
    function renderRegular(work) {
      const idx = workOrder.indexOf(work.id);
      const prevId = idx > 0 ? workOrder[idx - 1] : null;
      const nextId = idx < workOrder.length - 1 ? workOrder[idx + 1] : null;
      const prevWork = prevId ? worksData[prevId] : null;
      const nextWork = nextId ? worksData[nextId] : null;

      let sectionsHtml = '';
      if (work.sections) {
        sectionsHtml = work.sections.map((s, i) => {
          // 支持三种格式：{ video }、{ image }、{ title, body }
          if (s.video) {
            // poster：仅当用户明确指定 s.poster 时才设置，否则让浏览器自动展示第一帧
            const posterAttr = s.poster ? `poster="${s.poster}"` : '';
            return `
              <section class="work-section bg-glow" id="s${i}">
                <div style="position:relative;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);background:#000;">
                  <video controls preload="auto" playsinline
                         style="width:100%;display:block;"
                         ${posterAttr}
                         onerror="this.insertAdjacentHTML('afterend','<p style=&quot;color:#ff6b6b;font-size:0.8125rem;padding:16px;&quot;>⚠️ 视频加载失败，请检查文件格式是否为 H.264（.mp4）。当前文件可能无法在浏览器中播放。</p>')">
                    <source src="${s.video}" type="video/mp4">
                    <p style="color:#ff6b6b;padding:16px;">您的浏览器不支持视频播放，请升级浏览器。</p>
                  </video>
                </div>
                ${s.caption ? `<p style="text-align:center;color:rgba(255,255,255,0.5);font-size:0.8125rem;margin-top:12px;font-weight:300;">${s.caption}</p>` : ''}
              </section>
            `;
          } else if (s.image) {
            // 图片章节
            return `
              <section class="work-section bg-glow" id="s${i}">
                <img src="${s.image}" alt="${s.title || work.title + ' 第' + (i+1) + '部分'}" style="width:100%;border-radius:8px;border:1px solid rgba(255,255,255,0.08);cursor:pointer;" data-lightbox loading="lazy" />
                ${s.caption ? `<p style="text-align:center;color:rgba(255,255,255,0.5);font-size:0.8125rem;margin-top:12px;font-weight:300;">${s.caption}</p>` : ''}
              </section>
            `;
          } else {
            // 文字章节
            return `
              <section class="work-section bg-glow" id="s${i}">
                <h2 class="work-section__title">${s.title}</h2>
                <div class="work-section__body"><p>${s.body}</p></div>
              </section>
            `;
          }
        }).join('');
      }

      // 预览图（2列并排）
      let previewHtml = '';
      if (work.previewImages && work.previewImages.length > 0) {
        previewHtml = `<div class="bg-glow" style="margin-top:40px;"><div class="preview-grid">${work.previewImages.map(src => `<img src="${src}" alt="" data-lightbox loading="lazy">`).join('')}</div></div>`;
      }

      // 图片画廊（兼容 images 和 pages 两种写法，支持 emoji-grid 布局，支持 3D 模型按钮）
      let galleryHtml = '';
      const galleryImages = work.images || work.pages || [];
      if (galleryImages.length > 0) {
        const gridClass = work.layout === 'emoji-grid' ? 'emoji-grid' : 'image-grid';
        const imagesHtml = galleryImages.map(src => {
          if (work.modelMap && work.modelMap[src]) {
            return `<div class="img-with-model">
              <img src="${src}" alt="" data-lightbox loading="lazy">
              <button class="model-btn" onclick="open3DViewer('${work.modelMap[src]}')">▸ 点击查看3D模型</button>
            </div>`;
          }
          return `<img src="${src}" alt="" data-lightbox loading="lazy">`;
        }).join('');
        galleryHtml = `<div class="bg-glow" style="margin-top:40px;"><div class="${gridClass}">${imagesHtml}</div></div>`;
      }

      const html = `
        <!-- 面包屑 -->
        <div style="margin-bottom:32px;">
          <a href="index.html" style="color:rgba(255,255,255,0.5);text-decoration:none;">首页</a>
          <span style="color:rgba(255,255,255,0.3);margin:0 4px;">/</span>
          <a href="works.html" style="color:rgba(255,255,255,0.5);text-decoration:none;">作品</a>
          <span style="color:rgba(255,255,255,0.3);margin:0 4px;">/</span>
          <span style="color:#FFFFFF;">${work.title}</span>
        </div>

        <!-- 封面 -->
        ${work.cover ? `<div style="margin-bottom:80px;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);">
          <img src="${work.cover}" alt="${work.title}" style="width:100%;display:block;" />
        </div>` : ''}

        <!-- 概述 -->
        <div class="work-detail__overview">
          <div>
            <h1 style="font-size:clamp(1.5rem,3vw,2.75rem);font-weight:300;line-height:1.25;letter-spacing:0.01em;margin-bottom:16px;color:#FFFFFF;">${work.title}</h1>
            <p class="subtitle">${work.subtitle}</p>
          </div>
          <div class="work-detail__meta">
            ${work.meta.map(m => `
              <div class="meta-item">
                <h4>${m.label}</h4>
                <p>${Array.isArray(m.value) ? m.value.map(t => `<span class="tool-icon">${t}</span>`).join('') : m.value}</p>
              </div>
            `).join('')}
          </div>
        </div>

        ${sectionsHtml}
        ${previewHtml}
        ${galleryHtml}

        <!-- 上一篇/下一篇 -->
        <div class="work-nav">
          ${prevWork ? `
            <a href="work-detail.html?id=${prevId}" class="work-nav__item">
              <div class="work-nav__label">← 上一篇</div>
              <div class="work-nav__title">${prevWork.title}</div>
            </a>
          ` : '<div></div>'}
          ${nextWork ? `
            <a href="work-detail.html?id=${nextId}" class="work-nav__item work-nav__item--next">
              <div class="work-nav__label">下一篇 →</div>
              <div class="work-nav__title">${nextWork.title}</div>
            </a>
          ` : '<div></div>'}
        </div>
      `;

      document.getElementById('work-content').innerHTML = html;

      // 初始化 Lightbox
      initLightbox();

      // 检测视频是否能正常加载
      document.querySelectorAll('video[controls]').forEach(v => {
        v.addEventListener('error', () => {
          const msg = document.createElement('p');
          msg.style.cssText = 'color:#ff6b6b;font-size:0.8125rem;padding:12px 16px;background:rgba(255,100,100,0.08);border-radius:6px;margin-top:12px;';
          msg.innerHTML = '⚠️ 视频加载失败。请确认视频文件编码为 <b>H.264 (AVC)</b>，浏览器不支持 H.265/HEVC 格式。建议使用 HandBrake 或剪映导出为 H.264 .mp4。';
          v.parentElement.appendChild(msg);
        });
        // 能播放时日志输出，方便调试
        v.addEventListener('loadeddata', () => {
          console.log('✅ 视频加载成功：' + v.currentSrc);
        });
      });
    }

    // ============================================================
    //  Lightbox（复用）
    // ============================================================
    let lbImgs = [], lbIdx = 0;
    function initLightbox() {
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      document.querySelectorAll('[data-lightbox]').forEach((img, i) => {
        img.style.cursor = 'pointer';
        img.addEventListener('click', () => {
          lbImgs = [...document.querySelectorAll('[data-lightbox]')];
          lbIdx = i;
          lbImg.src = lbImgs[i].src;
          lb.classList.add('open');
          document.body.style.overflow = 'hidden';
        });
      });
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    function lbNav(d) {
      lbIdx = (lbIdx + d + lbImgs.length) % lbImgs.length;
      document.getElementById('lightbox-img').src = lbImgs[lbIdx].src;
    }
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbNav(-1);
      if (e.key === 'ArrowRight') lbNav(1);
    });
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });

    // ============================================================
    //  初始化
    // ============================================================
    (function() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || 'energy';
      const work = worksData[id];
      if (!work) {
        document.getElementById('work-content').innerHTML = '<p style="color:rgba(255,255,255,0.5);">未找到该作品。</p>';
        return;
      }
      work.id = id; // 方便内部使用

      if (work.type === 'catalog') {
        renderCatalog(work);
      } else {
        renderRegular(work);
      }
    })();

    // ========== 3D 模型查看器 ==========
    function open3DViewer(modelPath) {
      const modal = document.getElementById('modelViewerModal');
      const viewer = document.getElementById('modelViewer');
      const status = document.getElementById('modelStatus');
      if (status) status.textContent = '正在加载 3D 模型...';
      viewer.src = modelPath;
      modal.style.display = 'block';
      document.body.style.overflow = 'hidden';

      function onLoad() {
        if (status) status.textContent = '';
        viewer.removeEventListener('load', onLoad);
        viewer.removeEventListener('error', onError);
      }
      function onError(e) {
        if (status) status.innerHTML = '3D 模型加载失败，请确认：<br>1. 文件格式是否为标准 .glb/.gltf<br>2. 本地服务器是否已启动（python portfolio-serve.py）<br>3. 浏览器控制台查看详细错误';
        console.error('3D 模型加载失败:', e);
        viewer.removeEventListener('load', onLoad);
        viewer.removeEventListener('error', onError);
      }
      viewer.addEventListener('load', onLoad, { once: true });
      viewer.addEventListener('error', onError, { once: true });
    }
    function close3DViewer() {
      const modal = document.getElementById('modelViewerModal');
      const viewer = document.getElementById('modelViewer');
      modal.style.display = 'none';
      viewer.src = '';
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if(e.key === 'Escape') close3DViewer(); });
  </script>
  <!-- 3D 模型查看器 -->
  <div id="modelViewerModal">
    <button class="model-close-btn" onclick="close3DViewer()">✕</button>
    <div style="width:100%;height:100%;display:flex;flex-direction:column;">
      <div style="flex:1;display:flex;align-items:center;justify-content:center;position:relative;">
        <model-viewer id="modelViewer" alt="3D 模型" auto-rotate camera-controls>
        </model-viewer>
        <div id="modelStatus" style="position:absolute;bottom:60px;left:0;right:0;text-align:center;color:rgba(255,255,255,0.6);font-size:0.8125rem;"></div>
      </div>
      <p class="model-hint">拖拽旋转 · 滚轮缩放 · 右键平移 · ESC 关闭</p>
    </div>
  </div>

</body>
</html>
